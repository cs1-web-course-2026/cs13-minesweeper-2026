<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minesweeper UI - Лабораторна 1</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="game-wrapper">
  <header class="game-header">
    <div class="status-panel">
      <div class="lcd-display">010</div>
      <button class="reset-btn" aria-label="Почати нову гру" title="Почати нову гру" type="button">🙂</button>
      <div class="lcd-display">000</div>
    </div>
  </header>

  <main class="game-board">
    <button class="cell" aria-label="Закрита клітинка" type="button"></button>
    <button class="cell open num-1" aria-label="Відкрита клітинка, 1 міна поруч" type="button">1</button>
    <button class="cell open num-2" aria-label="Відкрита клітинка, 2 міни поруч" type="button">2</button>
    <button class="cell flag" aria-label="Прапорець" type="button"></button>
    <button class="cell mine" aria-label="Міна" type="button"></button>
    <button class="cell mine exploded" aria-label="Вибух міни" type="button"></button>
    <button class="cell open num-3" aria-label="Відкрита клітинка, 3 міни поруч" type="button">3</button>
    <button class="cell" aria-label="Закрита клітинка" type="button"></button>
    <button class="cell flag" aria-label="Прапорець" type="button"></button>
    <button class="cell" aria-label="Закрита клітинка" type="button"></button>

    <script>
      // Це просто для візуалізації в браузері, щоб не дублювати 100 рядків вручну
      const board = document.querySelector('.game-board');
      for (let i = 0; i < 90; i++) {
        const btn = document.createElement('button');
        btn.className = 'cell';
        btn.setAttribute('aria-label', 'Закрита клітинка');
        btn.setAttribute('type', 'button');
        board.appendChild(btn);
      }
    </script>
  </main>
</div>
</body>
</html>
