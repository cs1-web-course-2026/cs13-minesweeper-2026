<!DOCTYPE html>
<html lang="uk">

<head>

        </header>

            <div class="cell open num-7">7</div>
            <div class="cell open num-8">8</div>
            <div class="cell open"></div>

            <div class="cell open exploded">💣</div>
            <div class="cell open mine">💣</div>
            <div class="cell flag">🚩</div>

        </main>
    </div>

    <script>
        const timerElement = document.getElementById('timer');
        let seconds = 0;

        setInterval(() => {
            seconds++;
            const formattedTime = String(seconds).padStart(3, '0');
            timerElement.textContent = `⏱️ ${formattedTime}`;
        }, 1000);
    </script>
</body>

</html>
