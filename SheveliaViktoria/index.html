<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Minesweeper UI</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Гра "Minesweeper"</h1>
        <main class="minesweeper">
            <header class="game-header">
                <div class="counter">
                    <span class="label">Час</span>
                    <span class="value">000</span>
                </div>
                <button class="start-btn" type="button" aria-label="Нова гра">
                    Старт
                </button>
                <div class="counter">
                    <span class="label">Прапорці</span>
                    <span class="value">002</span>
                </div>
            </header>
            <section class="field" aria-label="Ігрове поле">
            <button class="cell cell--closed" type="button" aria-label="Закрита"></button>
            <button class="cell cell--closed" type="button" aria-label="Закрита"></button>
            <button class="cell cell--closed" type="button" aria-label="Закрита"></button>
            <button class="cell cell--closed" type="button" aria-label="Закрита"></button>
            <button class="cell cell--open cell--num-1" type="button">1</button>
            <button class="cell cell--open cell--num-2" type="button">2</button>
            <button class="cell cell--open cell--num-3" type="button">3</button>
            <button class="cell cell--closed" type="button" aria-label="Закрита"></button>
            <button class="cell cell--flag" type="button" aria-label="Прапорець без міни"></button>
            <button class="cell cell--open cell--num-1" type="button">1</button>
            <button class="cell cell--open cell--num-3" type="button">3</button>
            <button class="cell cell--open cell--num-2" type="button">2</button>
            <button class="cell cell--open cell--num-1" type="button">1</button>
            <button class="cell cell--open cell--num-1" type="button">1</button>
            <button class="cell cell--closed" type="button" aria-label="Закрита"></button>
            <button class="cell cell--closed" type="button" aria-label="Закрита"></button>
            <button class="cell cell--closed" type="button" aria-label="Закрита"></button>
            <button class="cell cell--open cell--num-1" type="button">1</button>
            <button class="cell cell--mine" type="button" aria-label="Міна"></button>
            <button class="cell cell--open cell--num-2" type="button">2</button>
            <button class="cell cell--open cell--num-2" type="button">2</button>
            <button class="cell cell--open cell--num-1" type="button">1</button>
            <button class="cell cell--closed" type="button" aria-label="Закрита"></button>
            <button class="cell cell--closed" type="button" aria-label="Закрита"></button>
            <button class="cell cell--closed" type="button" aria-label="Закрита"></button>
            <button class="cell cell--open cell--num-1" type="button">1</button>
            <button class="cell cell--open cell--num-1" type="button">1</button>
            <button class="cell cell--open cell--num-1" type="button">1</button>
            <button class="cell cell--open cell--num-2" type="button">2</button>
            <button class="cell cell--open cell--num-2" type="button">2</button>
            <button class="cell cell--closed" type="button" aria-label="Закрита"></button>
            <button class="cell cell--closed" type="button" aria-label="Закрита"></button>
            <button class="cell cell--closed" type="button" aria-label="Закрита"></button>
            <button class="cell cell--open cell--num-1" type="button">1</button>
            <button class="cell cell--open cell--num-1" type="button">1</button>
            <button class="cell cell--mine-hit" type="button" aria-label="Натиснута міна"></button>
            <button class="cell cell--open cell--num-1" type="button">1</button>
            <button class="cell cell--open cell--num-1" type="button">1</button>
            <button class="cell cell--flag-mine" type="button" aria-label="Прапорець на міні"></button>
            <button class="cell cell--closed" type="button" aria-label="Закрита"></button>
            <button class="cell cell--closed" type="button" aria-label="Закрита"></button>
            <button class="cell cell--closed" type="button" aria-label="Закрита"></button>
            <button class="cell cell--closed" type="button" aria-label="Закрита"></button>
            <button class="cell cell--closed" type="button" aria-label="Закрита"></button>
            <button class="cell cell--closed" type="button" aria-label="Закрита"></button>
            <button class="cell cell--closed" type="button" aria-label="Закрита"></button>
            <button class="cell cell--closed" type="button" aria-label="Закрита"></button>
            <button class="cell cell--closed" type="button" aria-label="Закрита"></button>
            </section>
        </main>
    </div>
</body>
</html>
