<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minesweeper</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <script src="script.js"></script>
    <div class="game-container">
        <header class="game-header">
            <div class="status-item" title="Прапорці">
                <span class="icon">🚩</span>
                <span id="flags-count">0</span>
            </div>
            
            <button class="reset-button" id="reset-btn">Нова Гра</button>
            
            <div class="status-item" title="Час">
                <span class="icon">⏱</span>
                <span id="game-timer">0</span>
            </div>
        </header>

        <main class="game-board" id="board">
            <button class="cell" aria-label="Закрита клітинка"></button> 
            <button class="cell revealed number-1">1</button> 
            <button class="cell revealed number-2">2</button>
            <button class="cell revealed number-3">3</button>
            <button class="cell flag" aria-label="Прапорець (можлива міна)">🚩</button> 
            <button class="cell revealed" aria-label="Відкрита пуста клітинка"></button>
            <button class="cell flag-wrong" aria-label="Невірно поставлений прапорець">🚩</button>
            <button class="cell mine" aria-label="Міна">💣</button> 
            <button class="cell mine exploded" aria-label="Вибух міни">💥</button>
            <button class="cell"></button>
            <button class="cell"></button>
            <button class="cell"></button>
            <button class="cell"></button>
            <button class="cell"></button>
            <button class="cell"></button>
            <button class="cell"></button>
            <button class="cell"></button>
            <button class="cell"></button>
            <button class="cell"></button>
        
            <button class="cell"></button>
            <button class="cell"></button>
            <button class="cell"></button>
            <button class="cell"></button>
            <button class="cell"></button>
            <button class="cell"></button>
        </main>
    </div>
    
    <div id="game-modal" class="modal">
        <div class="modal-content">
            <h2 id="modal-title">Результат</h2>
            <p id="modal-message">Опис результату</p>
            <button onclick="resetGame(); closeModal();" class="reset-button">Грати знову</button>
        </div>
    </div>

</body>
</html>
