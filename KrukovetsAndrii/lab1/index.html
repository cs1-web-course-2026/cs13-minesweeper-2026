<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minesweeper</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app">
    <section class="game-panel" aria-label="Game controls">
      <div class="counter" aria-live="polite">
        <span class="counter-label">Час</span>
        <span class="counter-value" id="timer">000</span>
      </div>

      <button class="start-btn" id="startBtn" type="button" aria-label="Почати нову гру">
        :)
      </button>

      <div class="counter" aria-live="polite">
        <span class="counter-label">Прапорці</span>
        <span class="counter-value" id="flags">010</span>
      </div>
    </section>

    <section class="board-wrap" aria-label="Game board">
      <div class="board" id="board" role="grid" aria-label="Minesweeper board"></div>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
